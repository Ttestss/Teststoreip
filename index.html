<!DOCTYPE html>
<html lang="th"></html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store IP Finder - Food 15 Feb 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);
    font-family:'IBM Plex Mono','Courier New',monospace;
    color:#e2e8f0;
    padding:28px 20px;
  }
  .wrap{max-width:960px;margin:0 auto}
  .dot{
    width:10px;height:10px;border-radius:50%;
    background:#22d3ee;box-shadow:0 0 10px #22d3ee;
    display:inline-block;margin-right:10px;
    animation:pulse 2s infinite;
  }
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.85)}}
  .label{font-size:11px;color:#64748b;letter-spacing:3px;text-transform:uppercase;vertical-align:middle}
  h1{font-size:28px;font-weight:700;color:#f1f5f9;letter-spacing:-1px;margin:6px 0 4px}
  .sub{font-size:12px;color:#475569;margin-bottom:28px}
  .card{
    background:rgba(30,41,59,.8);
    border:1px solid rgba(99,102,241,.3);
    border-radius:12px;padding:20px 24px;
    margin-bottom:20px;
    display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;
  }
  .field{flex:1 1 220px}
  .field label{display:block;font-size:10px;color:#94a3b8;letter-spacing:2px;margin-bottom:6px}
  input,select{
    width:100%;background:rgba(15,23,42,.8);
    border:1px solid rgba(99,102,241,.4);
    border-radius:8px;padding:10px 14px;
    color:#22d3ee;font-size:14px;
    font-family:inherit;outline:none;
    transition:border-color .2s;
  }
  input:focus,select:focus{border-color:#6366f1}
  select{color:#94a3b8;cursor:pointer}
  select option{background:#1e293b;color:#e2e8f0}
  .btn-clear{
    background:transparent;
    border:1px solid rgba(239,68,68,.4);
    border-radius:8px;padding:10px 16px;
    color:#ef4444;font-size:12px;
    font-family:inherit;cursor:pointer;
    letter-spacing:1px;white-space:nowrap;
  }
  .btn-clear:hover{background:rgba(239,68,68,.1)}
  .count{font-size:11px;color:#475569;margin-bottom:12px;letter-spacing:1px}
  .table-wrap{
    background:rgba(15,23,42,.6);
    border:1px solid rgba(51,65,85,.8);
    border-radius:12px;overflow:hidden;
  }
  .thead{
    display:grid;
    grid-template-columns:100px 130px 1fr 150px 110px;
    padding:10px 16px;
    background:rgba(30,41,59,.9);
    border-bottom:1px solid rgba(51,65,85,.8);
    font-size:10px;color:#64748b;
    letter-spacing:2px;font-weight:600;
  }
  .row{
    display:grid;
    grid-template-columns:100px 130px 1fr 150px 110px;
    padding:12px 16px;
    border-bottom:1px solid rgba(30,41,59,.8);
    align-items:center;
    transition:background .15s;
    cursor:default;
  }
  .row:last-child{border-bottom:none}
  .row:hover{background:rgba(99,102,241,.06)}
  .badge{
    display:inline-block;
    font-size:10px;font-weight:700;
    padding:3px 7px;border-radius:4px;
    letter-spacing:.5px;
    max-width:90px;overflow:hidden;
    text-overflow:ellipsis;white-space:nowrap;
  }
  .site-id{font-size:12px;color:#94a3b8}
  .site-name{
    font-size:13px;color:#cbd5e1;
    white-space:nowrap;overflow:hidden;
    text-overflow:ellipsis;padding-right:12px;
  }
  .ip-btn{
    background:transparent;border:none;
    padding:4px 8px;border-radius:6px;
    cursor:pointer;font-family:inherit;
    font-size:13px;color:#34d399;
    letter-spacing:.5px;transition:all .2s;
    text-align:left;
  }
  .ip-btn:hover{color:#22d3ee;background:rgba(34,211,238,.08)}
  .ip-copied{color:#22d3ee!important}
  .province{font-size:11px;color:#475569}
  .empty{text-align:center;padding:60px 20px;color:#475569;font-size:13px}
  .footer{margin-top:20px;font-size:10px;color:#334155;text-align:center}
  @media(max-width:700px){
    .thead,.row{grid-template-columns:90px 110px 1fr 130px;font-size:11px}
    .thead span:last-child,.row .province{display:none}
  }
</style>
</head>
<body>
<div class="wrap">
  <div style="display:flex;align-items:center;margin-bottom:6px">

  <div class="count" id="countLabel"></div>
  <div id="resultsArea"></div>
  <div class="footer">คลิก IP Address เพื่อ copy · แสดงสูงสุด 200 รายการต่อครั้ง</div>
</div>

const brandColors = {
  TH_BC:"#e74c3c",TH_BK:"#e67e22",TH_BT:"#f1c40f",TH_CF:"#1abc9c",
  TH_DQ:"#e91e63",TH_PL:"#9b59b6",TH_PZ:"#e74c3c",TH_SM:"#3498db",
  TH_SW:"#2ecc71",TH_SZ:"#e67e22",TH_TE:"#1abc9c",

  MD_TE:"#1abc9c",SC_BK:"#f39c12",SC_CF:"#16a085"
};

function getColor(brand){ return brandColors[brand]||"#64748b"; }

// Init brands
document.getElementById("totalCount").textContent = STORE_DATA.length.toLocaleString();
const brands = ["ALL",...Array.from(new Set(STORE_DATA.map(s=>s.SiteGroup))).sort()];
const sel = document.getElementById("brandSelect");
brands.forEach(b=>{
  if(b==="ALL") return;
  const o = document.createElement("option");
  o.value=b; o.textContent=b; sel.appendChild(o);
});

function renderResults(){
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  const brand = sel.value;
  document.getElementById("clearBtn").style.display = (q||brand!=="ALL")?"":"none";

  let filtered = STORE_DATA;
  if(brand!=="ALL") filtered = filtered.filter(s=>s.SiteGroup===brand);
  if(q) filtered = filtered.filter(s=>
    (s.BusinessUnit||"").toLowerCase().includes(q)||
    (s.SiteID||"").toLowerCase().includes(q)||
    (s.SiteName||"").toLowerCase().includes(q)
  );

  const total = filtered.length;
  const show = filtered.slice(0,200);
  document.getElementById("countLabel").textContent =
    total>0 ? `แสดง ${show.length}${total>200?" (แรก 200 จาก "+total.toLocaleString()+")"  :""} รายการ` : "ไม่พบข้อมูล";

  const area = document.getElementById("resultsArea");
  if(show.length===0){
    area.innerHTML = q||brand!=="ALL"
      ? '<div class="empty">🔍<br><br>ไม่พบ Store ที่ตรงกับเงื่อนไข</div>'
      : "";
    return;
  }

  let html = '<div class="table-wrap"><div class="thead"><span>BRAND</span><span>STORE ID</span><span>SITE NAME</span><span>IP ADDRESS</span><span class="province">จังหวัด</span></div>';
  show.forEach(s=>{
    const c = getColor(s.SiteGroup);
    html += `<div class="row">
      <span><span class="badge" style="background:${c}22;color:${c};border:1px solid ${c}44">${s.SiteGroup}</span></span>
      <span class="site-id">${s.BusinessUnit||s.SiteID}</span>
      <span class="site-name" title="${s.SiteName}">${s.SiteName}</span>
      <button class="ip-btn" onclick="copyIP(this,'${s.IP_Address}')">${s.IP_Address}</button>
      <span class="province">${s.StateProvince||s.Region||"—"}</span>
    </div>`;
  });
  html += '</div>';
  area.innerHTML = html;
}

function copyIP(btn, ip){
  navigator.clipboard.writeText(ip).then(()=>{
    const orig = btn.textContent;
    btn.textContent="✓ copied!";
    btn.classList.add("ip-copied");
    setTimeout(()=>{btn.textContent=orig;btn.classList.remove("ip-copied");},1500);
  }).catch(()=>{
    // fallback
    const t=document.createElement("textarea");
    t.value=ip;document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t);
    const orig=btn.textContent;btn.textContent="✓ copied!";btn.classList.add("ip-copied");
    setTimeout(()=>{btn.textContent=orig;btn.classList.remove("ip-copied");},1500);
  });
}

function clearAll(){
  document.getElementById("searchInput").value="";
  sel.value="ALL";
  renderResults();
}

renderResults();
